# 🌟 IPv4 Supabase Connection Pooler Route (Port 6543 - Transaction Mode)
spring.datasource.url=jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
# 🔑 CRITICAL: The proxy requires this exact dot-notation format to identify your database project
spring.datasource.username=postgres
# 🔑 Your clean letters-and-numbers database password
spring.datasource.password=Zaceinsteinzac481899

# ⚡ HikariCP Tuning for Cloud Poolers (Prevents Broken Pipes / Connection Drops)
# Keep the pool size reasonable; the remote pooler handles the heavy lifting
spring.datasource.hikari.maximum-pool-size=10
# Maximum time (ms) Hikari will wait for a connection from the pool
spring.datasource.hikari.connection-timeout=30000
# Max lifetime of a connection (set shorter than Supabase's server-side timeout)
spring.datasource.hikari.max-lifetime=600000
# How long a connection can sit idle before being retired
spring.datasource.hikari.idle-timeout=300000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true